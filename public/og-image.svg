<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08080a"/>
      <stop offset="100%" stop-color="#0e0e14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5cc8ff"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b7cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="900" cy="200" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5cc8ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5cc8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="200" cy="500" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b7cf6" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#8b7cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g transform="translate(80, 110)">
    <rect width="180" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="20" cy="16" r="4" fill="#22c55e"/>
    <text x="34" y="21" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.7" letter-spacing="0.5">Open to opportunities</text>
  </g>

  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#ffffff" fill-opacity="0.6" letter-spacing="2">SUBHAM SHARMA</text>

  <text x="80" y="330" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="700" fill="#ffffff" letter-spacing="-2">Architecting Production</text>
  <text x="80" y="410" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="700" fill="url(#accent)" letter-spacing="-2">AI &amp; Cloud Systems</text>

  <text x="80" y="475" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#ffffff" fill-opacity="0.55">Software Engineer · 4+ YOE · AWS &amp; Azure · LLM Infrastructure</text>

  <g transform="translate(80, 530)" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.7">
    <rect width="120" height="36" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#5cc8ff" stroke-opacity="0.3"/>
    <text x="60" y="23" text-anchor="middle">20M+ Pages OCR</text>

    <g transform="translate(132, 0)">
      <rect width="120" height="36" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#22d3ee" stroke-opacity="0.3"/>
      <text x="60" y="23" text-anchor="middle">10M+ Records</text>
    </g>
    <g transform="translate(264, 0)">
      <rect width="120" height="36" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#8b7cf6" stroke-opacity="0.3"/>
      <text x="60" y="23" text-anchor="middle">99% Uptime</text>
    </g>
    <g transform="translate(396, 0)">
      <rect width="140" height="36" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#5cc8ff" stroke-opacity="0.3"/>
      <text x="70" y="23" text-anchor="middle">35% Cost Reduction</text>
    </g>
  </g>

  <g transform="translate(900, 280)" opacity="0.85">
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.4"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="30" fill="#0a0a0c" stroke="url(#accent)" stroke-width="1.5"/>

    <circle cx="-70" cy="-40" r="6" fill="#5cc8ff"/>
    <circle cx="80" cy="-30" r="6" fill="#22d3ee"/>
    <circle cx="60" cy="60" r="6" fill="#8b7cf6"/>
    <circle cx="-60" cy="70" r="6" fill="#5cc8ff"/>
    <circle cx="100" cy="20" r="5" fill="#8b7cf6"/>
    <circle cx="-90" cy="20" r="5" fill="#22d3ee"/>

    <line x1="-70" y1="-40" x2="0" y2="0" stroke="#5cc8ff" stroke-width="1" opacity="0.4"/>
    <line x1="80" y1="-30" x2="0" y2="0" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <line x1="60" y1="60" x2="0" y2="0" stroke="#8b7cf6" stroke-width="1" opacity="0.4"/>
    <line x1="-60" y1="70" x2="0" y2="0" stroke="#5cc8ff" stroke-width="1" opacity="0.4"/>
    <line x1="100" y1="20" x2="0" y2="0" stroke="#8b7cf6" stroke-width="1" opacity="0.4"/>
    <line x1="-90" y1="20" x2="0" y2="0" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
