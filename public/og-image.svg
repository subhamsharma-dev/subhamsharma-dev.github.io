<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08080a"/>
      <stop offset="100%" stop-color="#0e0e14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5cc8ff"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b7cf6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="950" cy="180" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5cc8ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#5cc8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="200" cy="500" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b7cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8b7cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cloudGlow" cx="940" cy="320" r="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5cc8ff" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#8b7cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b7cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Availability badge -->
  <g transform="translate(80, 110)">
    <rect width="190" height="32" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#22c55e" stroke-opacity="0.25"/>
    <circle cx="20" cy="16" r="4" fill="#22c55e"/>
    <text x="34" y="21" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#86efac" letter-spacing="1">OPEN TO OPPORTUNITIES</text>
  </g>

  <!-- Subtitle -->
  <text x="80" y="230" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#ffffff" fill-opacity="0.55" letter-spacing="2">SUBHAM SHARMA</text>

  <!-- Headline -->
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-2">Curious engineer.</text>
  <text x="80" y="395" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="700" fill="url(#accent)" letter-spacing="-2">Building things that ship.</text>

  <!-- Tagline -->
  <text x="80" y="460" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#ffffff" fill-opacity="0.55">4+ years · AI · Cloud · Backend · Full Stack · DevOps</text>

  <!-- Stat chips -->
  <g transform="translate(80, 515)" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.75">
    <rect width="130" height="36" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#5cc8ff" stroke-opacity="0.3"/>
    <text x="65" y="23" text-anchor="middle">20M+ pages</text>

    <g transform="translate(142, 0)">
      <rect width="130" height="36" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#22d3ee" stroke-opacity="0.3"/>
      <text x="65" y="23" text-anchor="middle">10M+ records</text>
    </g>
    <g transform="translate(284, 0)">
      <rect width="130" height="36" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#8b7cf6" stroke-opacity="0.3"/>
      <text x="65" y="23" text-anchor="middle">10M+ LLM tokens</text>
    </g>
    <g transform="translate(426, 0)">
      <rect width="120" height="36" rx="18" fill="#ffffff" fill-opacity="0.04" stroke="#5cc8ff" stroke-opacity="0.3"/>
      <text x="60" y="23" text-anchor="middle">99% uptime</text>
    </g>
  </g>

  <!-- Particle cloud — circular point distribution -->
  <g transform="translate(940, 290)">
    <rect x="-260" y="-260" width="520" height="520" fill="url(#cloudGlow)"/>

    <!-- Outer shell ~r=210 -->
    <circle cx="0" cy="-200" r="2.5" fill="#5cc8ff" opacity="0.9"/>
    <circle cx="140" cy="-150" r="2" fill="#22d3ee" opacity="0.85"/>
    <circle cx="200" cy="-50" r="2.5" fill="#5cc8ff" opacity="0.85"/>
    <circle cx="195" cy="80" r="2" fill="#8b7cf6" opacity="0.8"/>
    <circle cx="100" cy="180" r="2.5" fill="#8b7cf6" opacity="0.9"/>
    <circle cx="-50" cy="210" r="2" fill="#5cc8ff" opacity="0.85"/>
    <circle cx="-180" cy="120" r="2.5" fill="#22d3ee" opacity="0.9"/>
    <circle cx="-210" cy="-30" r="2" fill="#5cc8ff" opacity="0.85"/>
    <circle cx="-160" cy="-140" r="2.5" fill="#8b7cf6" opacity="0.9"/>
    <circle cx="-60" cy="-195" r="2" fill="#22d3ee" opacity="0.85"/>
    <circle cx="80" cy="-180" r="2" fill="#5cc8ff" opacity="0.85"/>
    <circle cx="175" cy="-100" r="2" fill="#22d3ee" opacity="0.8"/>
    <circle cx="220" cy="20" r="2" fill="#8b7cf6" opacity="0.8"/>
    <circle cx="160" cy="130" r="2.5" fill="#5cc8ff" opacity="0.85"/>
    <circle cx="30" cy="210" r="2" fill="#22d3ee" opacity="0.85"/>
    <circle cx="-110" cy="180" r="2" fill="#8b7cf6" opacity="0.85"/>
    <circle cx="-200" cy="60" r="2" fill="#5cc8ff" opacity="0.85"/>
    <circle cx="-180" cy="-90" r="2" fill="#8b7cf6" opacity="0.85"/>
    <circle cx="-90" cy="-180" r="2.5" fill="#22d3ee" opacity="0.9"/>

    <!-- Mid shell ~r=130 -->
    <circle cx="0" cy="-130" r="1.8" fill="#5cc8ff" opacity="0.7"/>
    <circle cx="90" cy="-95" r="1.5" fill="#22d3ee" opacity="0.7"/>
    <circle cx="130" cy="-15" r="2" fill="#5cc8ff" opacity="0.75"/>
    <circle cx="100" cy="85" r="1.8" fill="#8b7cf6" opacity="0.7"/>
    <circle cx="15" cy="135" r="1.5" fill="#8b7cf6" opacity="0.75"/>
    <circle cx="-85" cy="105" r="2" fill="#5cc8ff" opacity="0.7"/>
    <circle cx="-130" cy="10" r="1.8" fill="#22d3ee" opacity="0.7"/>
    <circle cx="-105" cy="-85" r="1.5" fill="#8b7cf6" opacity="0.75"/>
    <circle cx="-20" cy="-130" r="2" fill="#22d3ee" opacity="0.7"/>
    <circle cx="60" cy="-115" r="1.5" fill="#5cc8ff" opacity="0.7"/>
    <circle cx="125" cy="50" r="1.8" fill="#8b7cf6" opacity="0.75"/>
    <circle cx="-55" cy="125" r="1.5" fill="#5cc8ff" opacity="0.7"/>

    <!-- Inner core ~r=60 -->
    <circle cx="0" cy="-55" r="1.5" fill="#5cc8ff" opacity="0.6"/>
    <circle cx="45" cy="-30" r="1.2" fill="#22d3ee" opacity="0.55"/>
    <circle cx="55" cy="25" r="1.5" fill="#8b7cf6" opacity="0.6"/>
    <circle cx="15" cy="55" r="1.2" fill="#5cc8ff" opacity="0.55"/>
    <circle cx="-40" cy="40" r="1.2" fill="#8b7cf6" opacity="0.6"/>
    <circle cx="-55" cy="-15" r="1.5" fill="#22d3ee" opacity="0.55"/>
    <circle cx="-25" cy="-50" r="1.2" fill="#5cc8ff" opacity="0.6"/>
    <circle cx="0" cy="0" r="1.5" fill="#ffffff" opacity="0.6"/>
  </g>
</svg>
